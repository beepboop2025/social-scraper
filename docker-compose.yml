services:
  # ── Database (TimescaleDB + pgvector) ────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scraper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-econscraper}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scraper} -d ${POSTGRES_DB:-econscraper}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Cache + Celery Broker ────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Object Storage (raw data) ────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-econscraper}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-econscraper123}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Kafka (pipeline messaging) ───────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Tor Proxy (dark web) ─────────────────────────────────────
  tor:
    image: dperson/torproxy:latest
    ports:
      - "9050:9050"
      - "8118:8118"
    environment:
      TOR_MaxCircuitDirtiness: 600
      TOR_NewCircuitPeriod: 120
    restart: unless-stopped

  # ── FastAPI Backend ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scraper}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-econscraper}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TOR_PROXY: socks5://tor:9050
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-econscraper}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-econscraper123}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      # Downstream apps
      DRAGONSCOPE_REDIS_URL: ${DRAGONSCOPE_REDIS_URL:-redis://redis:6379/1}
      DRAGONSCOPE_API_URL: ${DRAGONSCOPE_API_URL:-http://host.docker.internal:3456}
      LIQUIFI_REDIS_URL: ${LIQUIFI_REDIS_URL:-redis://redis:6379/2}
      LIQUIFI_API_URL: ${LIQUIFI_API_URL:-http://host.docker.internal:8001}
      # Collector API keys
      FRED_API_KEY: ${FRED_API_KEY:-}
      DATA_GOV_API_KEY: ${DATA_GOV_API_KEY:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      TWITTER_COOKIES_PATH: ${TWITTER_COOKIES_PATH:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALERT_CHAT_ID: ${TELEGRAM_ALERT_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Celery Worker (collectors + processors) ──────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A core.scheduler worker
      --queues=collectors,processors,routing,health,default
      --concurrency=6
      --loglevel=info
      --max-tasks-per-child=200
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scraper}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-econscraper}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TOR_PROXY: socks5://tor:9050
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-econscraper}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-econscraper123}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      DRAGONSCOPE_REDIS_URL: ${DRAGONSCOPE_REDIS_URL:-redis://redis:6379/1}
      DRAGONSCOPE_API_URL: ${DRAGONSCOPE_API_URL:-http://host.docker.internal:3456}
      LIQUIFI_REDIS_URL: ${LIQUIFI_REDIS_URL:-redis://redis:6379/2}
      LIQUIFI_API_URL: ${LIQUIFI_API_URL:-http://host.docker.internal:8001}
      FRED_API_KEY: ${FRED_API_KEY:-}
      DATA_GOV_API_KEY: ${DATA_GOV_API_KEY:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      TWITTER_COOKIES_PATH: ${TWITTER_COOKIES_PATH:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALERT_CHAT_ID: ${TELEGRAM_ALERT_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      tor:
        condition: service_started
    restart: unless-stopped

  # ── Celery Beat (24/7 scheduler) ─────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A core.scheduler beat
      --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── NLP Worker (dedicated processor queue) ──────────────────
  nlp-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A core.scheduler worker
      --queues=processors
      --concurrency=2
      --loglevel=info
      --max-tasks-per-child=50
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scraper}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-econscraper}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Flower (Celery monitoring) ───────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A core.scheduler flower
      --port=5555
      --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
